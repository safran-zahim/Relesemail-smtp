services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-generator-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Edit values here. No separate .env file is required.
      SMTP_HOST: "sandbox.smtp.mailtrap.io"
      SMTP_PORT: "2525"
      SMTP_SECURE: "false"
      SMTP_USER: "0dfff3125e9791"
      SMTP_PASS: "08ffa688c94e78"
      SMTP_FROM: "noreply@yourdomain.com"
      MY_SECRET_KEY: "OrangeHRM_2026_Secure_Key_!@#"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
